<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linaria Crochet</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cat.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="./img/favicon.ico">
</head>

<body>
  <!-- Menu Mobile Toggle -->
  <button class="mobile-menu-toggle" aria-label="Abrir menu">
    <i class="fas fa-bars"></i>
  </button>

  <ul class="nav nav-menu" id="pp-menu">
    <header class="sidebar-header">
      <img src="./img/logo.png" alt="Linaria Crochet Logo" />
      <h1>Linaria Crochet</h1>
    </header>
  </ul>

  <div class="overlay"></div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-container">
      <div class="hero-content">
        <h1 class="hero-title">Transformando fios em emoções</h1>
        <p class="hero-subtitle">Peças artesanais feitas com carinho e dedicação</p>
        <a href="#products" class="hero-button">Ver Produtos</a>
      </div>

      <!-- Gato animado -->
      <div class="hero-animation">
        <div class="cat-logo"></div>
      </div>
    </div>
  </section>

  <main class="main-container" id="products">
    <h2 class="section-title">Nossos Produtos</h2>
    <div class="grid" id="product-grid"></div>
  </main>

  <!-- Rodapé -->
  <footer class="footer" id="contact">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="./img/logo.png" alt="Linaria Crochet">
          <p>Transformando fios em emoções</p>
        </div>
        <div class="footer-info">
          <h3>Entre em Contato</h3>
          <div class="contact-info">
            <p><i class="fab fa-instagram"></i> @thaly_arj</p>
            <p><i class="fab fa-whatsapp"></i> (XX) XXXXX-XXXX</p>
            <p><i class="far fa-envelope"></i> email@exemplo.com</p>
          </div>
        </div>
        <div class="footer-links">
          <a href="https://www.instagram.com/thaly_arj/" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="#">
            <i class="fab fa-whatsapp"></i>
          </a>
          <a href="#">
            <i class="far fa-envelope"></i>
          </a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2025 Linaria Crochet. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="js/menu.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
